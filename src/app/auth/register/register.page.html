<ion-content [fullscreen]="true" class="register-content">

  <div class="register-wrapper">

    <!-- Header Brand -->
    <div class="brand-header">
      <div class="brand-logo">
        <ion-icon name="checkmark-circle" class="logo-icon"></ion-icon>
      </div>
      <span class="brand-name">Daily TaskMaster</span>
    </div>

    <!-- Title Section -->
    <div class="title-section">
      <h1 class="page-title">Create Account</h1>
      <p class="page-subtitle">Join our premium ecosystem for curated productivity and editorial focus.</p>
    </div>

    <!-- Card: Form + Button + Footer -->
    <div class="form-card">

      <!-- Form Section -->
      <div class="form-section">

        <!-- Full Name -->
        <div class="input-group">
          <label class="input-label">FULL NAME</label>
          <div class="input-wrapper">
            <ion-icon name="person-outline" class="input-icon"></ion-icon>
            <input
              type="text"
              class="custom-input"
              placeholder="Your Name"
            />
          </div>
        </div>

        <!-- Email Address -->
        <div class="input-group">
          <label class="input-label">EMAIL ADDRESS</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <input
              type="email"
              class="custom-input"
              placeholder="name@example.com"
            />
          </div>
          <div class="input-hint">
            <ion-icon name="information-circle-outline" class="hint-icon"></ion-icon>
            <span class="hint-text">We'll send a verification link to this email address to secure your account.</span>
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label class="input-label">PASSWORD</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              type="password"
              class="custom-input"
              placeholder="••••••••"
            />
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group">
          <label class="input-label">CONFIRM PASSWORD</label>
          <div class="input-wrapper">
            <ion-icon name="shield-checkmark-outline" class="input-icon"></ion-icon>
            <input
              type="password"
              class="custom-input"
              placeholder="••••••••"
            />
          </div>
        </div>

      </div>

      <!-- Create Account Button -->
      <ion-button expand="block" class="btn-create-account" (click)="goRegister()">
        Create Account
      </ion-button>

      <!-- Divider -->
      <div class="divider-section">
        <span class="divider-text">OR REGISTER WITH</span>
      </div>

      <!-- Google Button -->
      <ion-button expand="block" class="btn-google" (click)="goGoogleRegister()">
        <ion-icon name="logo-google" class="google-icon"></ion-icon>
        Google
      </ion-button>

      <!-- Sign In Link -->
      <div class="signin-link">
        <span class="signin-text">Already have an account?</span>
        <span class="signin-anchor" (click)="goLogin()">Sign In</span>
      </div>

    </div>
    <!-- end .form-card -->

  </div>

</ion-content>
