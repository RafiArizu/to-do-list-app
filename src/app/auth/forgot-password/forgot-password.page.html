<ion-header class="forgot-header" [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="back-btn" (click)="goBack()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Security</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="forgot-content">

  <div class="forgot-wrapper">

    
    <div class="icon-section">
      <div class="icon-box">
        <ion-icon name="reload-circle-outline" class="main-icon"></ion-icon>
      </div>
    </div>

    
    <div class="title-section">
      <h1 class="page-title">Forgot Password</h1>
      <p class="page-subtitle">Enter your email address and we'll send you instructions to reset your password.</p>
    </div>

    
    <div class="form-card">

     
      <div class="input-group">
        <label class="input-label">EMAIL ADDRESS</label>
        <div class="input-wrapper">
          <input
            type="email"
            class="custom-input"
            placeholder="Enter your email"
            [(ngModel)]="email"
          />
          <ion-icon name="mail-outline" class="input-icon-right"></ion-icon>
        </div>
      </div>

      
      <ion-button expand="block" class="btn-send" (click)="sendReset()">
        Send Reset Instructions
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>

      <!-- Email kosong -->
      <div class="error-alert" *ngIf="errorEmpty">
        <ion-icon name="alert-circle-outline" class="error-icon"></ion-icon>
        <span class="error-text">Email kosong. Silahkan isi email!</span>
      </div>

      <!-- Format salah -->
      <div class="error-alert" *ngIf="errorFormat">
        <ion-icon name="alert-circle-outline" class="error-icon"></ion-icon>
        <span class="error-text">Format email tidak valid!</span>
      </div>

      <!-- Email tidak terdaftar -->
      <div class="error-alert" *ngIf="errorNotFound">
        <ion-icon name="alert-circle-outline" class="error-icon"></ion-icon>
        <span class="error-text">Email tidak terdaftar!</span>
      </div>

    </div>

  </div>

</ion-content>
